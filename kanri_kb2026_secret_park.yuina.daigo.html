<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>管理画面</title>
  <link rel="stylesheet" href="./admin.css" />
  <style>
    /* カレンダーを確実に1タップで開くためのハック */
    .date-picker-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 5px;
      overflow: hidden;
    }
    .date-picker-input {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0; cursor: pointer; z-index: 10; box-sizing: border-box;
    }
    .date-picker-input::-webkit-calendar-picker-indicator {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0; cursor: pointer; padding: 0; margin: 0;
    }
  </style>
</head>
<body>

  <header class="hd" style="display:flex; justify-content:space-between; align-items:center; padding: 0 15px;">
    <h1 style="margin:0;">管理画面</h1>
    <button id="admHelpBulk" class="btn-outline press" style="font-size: 12px; padding: 6px 10px; margin: 0; height: auto;">使い方(定員一括)</button>
  </header>

  <main class="container">
    <section class="card">
      <div class="card-hd">
        <h2>開放設定（ON=黒/白文字）</h2>
      </div>

      <div class="grid">
        <label style="display:block;">日付
          <div class="btn-outline press date-picker-wrapper">
            <span id="admDateText">----</span>
            <span aria-hidden="true">📅</span>
            <input id="admDateNative" class="date-picker-input" type="date" />
          </div>
        </label>
      </div>

      <div class="actions">
        <button id="admCapBulkBtn" class="btn-outline press">定員一括変更</button>
        <button id="admAllOff" class="btn-outline press">全部OFF</button>
        <button id="admOpenAll" class="btn-outline press">全部ON</button>
      </div>

      <div style="margin-top:10px;display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-start;align-items:center;">
        <input id="admCapBulk" type="number" min="0" max="99" inputmode="numeric" placeholder="00" class="bulk-cap-input" />
      </div>

      <div class="top-actions">
        <button id="admListBtn" class="btn-pill btn-blue press">予約一覧</button>
        <button id="admDayDetailsBtn" class="btn-pill btn-blue press">当日詳細</button>
        <button id="admCommit" class="btn-pill btn-red press">決定（反映）</button>
        <button id="admForce" class="btn-pill btn-outline-red press">緊急閉鎖</button>
      </div>

      <h2 style="margin-top:0;">時間 / 予約数 / 定員</h2>

      <button id="admHelpSlots" class="btn-outline press" style="width:100%;">使い方（時間枠）</button>
      <div id="admToggles" class="slots" style="margin-top:10px;"></div>

      <div class="muted" style="margin-top:8px;">
        ※予約がある時間はOFFにできません。定員は「定員設定」で一括設定と時間ごとに微調整をしてください。
      </div>
    </section>

    <section class="card">
      <h2>残数 / 予約一覧</h2>
      <div id="admTimes"></div>
      <div id="admList" class="list"></div>
    </section>

    <section class="card">
      <div class="card-hd">
        <h2>キャンセル料金 未回収対象</h2>
      </div>
      <button id="debtsToggleBtn" class="btn-outline press" style="width:100%">表示／非表示</button>
      <div id="debtsBox" hidden>
        <div id="admDebts" class="debts" style="margin-top:10px;"></div>
        <div class="actions"><button id="admClear" class="btn press">選択を解除</button></div>
      </div>
    </section>

    <section class="card">
      <div class="card-hd">
        <h2>基本設定</h2>
        <button id="baseToggleBtn" class="btn-outline press">表示／非表示</button>
      </div>
      <div id="baseBox" hidden>
        <div class="grid">
          <label>受付締切（何時間前まで）
            <input id="cutoffHours" type="number" min="0" inputmode="numeric" value="1" />
          </label>
        </div>
        
        <hr style="margin: 15px 0; border: none; border-top: 1px dashed #ccc;" />
        <h3 style="font-size:16px; margin-bottom:8px; color:#2563EB;">🎁 キャンペーン値引き設定</h3>
        <div class="grid" style="gap:10px;">
          <label>開始日
            <input id="campStart" type="date" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:8px;" />
          </label>
          <label>終了日
            <input id="campEnd" type="date" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:8px;" />
          </label>
          <label>値引き額 (1人あたり/円)
            <input id="campDiscount" type="number" min="0" inputmode="numeric" placeholder="例: 300" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:8px;" />
          </label>
        </div>
        
        <div class="actions" style="margin-top:15px;"><button id="saveBase" class="btn press">設定を保存</button></div>
      </div>
    </section>

  </main>
  <footer class="ft"><small>© KB PERK</small></footer>

  <div id="banner" class="banner" style="display:none; z-index:99999;"></div>

  <div id="modal" class="modal" style="display:none">
    <div class="modal-card">
      <div class="modal-hd">
        <strong id="modalTitle" class="help-title">タイトル</strong>
        <button id="modalClose" class="modal-close" aria-label="閉じる">×</button>
      </div>
      <div id="modalBody" class="help-body"></div>
      <div id="modalFooter" class="modal-ft"></div>
    </div>
  </div>

  <script src="./admin.js"></script>

  <div id="overlay" class="overlay" style="display:none; z-index:99999;" aria-live="polite" aria-busy="true">
    <div class="overlay-card">
      <div id="overlayText" class="overlay-text">読み込み中</div>
    </div>
  </div>

</body>
</html>
